name: Flake Build

on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "flakes/**"
      - "lib/**"
      - "modules/**"
      - "overlays/**"
      - "pkgs/**"
  pull_request:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "flakes/**"
      - "lib/**"
      - "modules/**"
      - "overlays/**"
      - "pkgs/**"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  flake-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update flake inputs
        run: nix flake update

      - name: Run nix flake check
        run: nix flake check --no-build

      - name: Show flake outputs
        run: nix flake show

      - name: Create pull request with flake.lock
        if: github.event_name != 'pull_request'
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update flake.lock [skip ci]"
          branch: update-flake-lock
          delete-branch: true
          title: "chore: update flake.lock"
          body: |
            Automated `nix flake update` run.

            - Updated flake inputs to latest versions
            - Verified with `nix flake check --no-build`
          base: main
          labels: auto-merge

      - name: Auto-merge pull request
        if: github.event_name != 'pull_request' && steps.create-pr.outputs.pull-request-number != ''
        run: |
          gh pr merge --squash --auto --delete-branch "${{ steps.create-pr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
