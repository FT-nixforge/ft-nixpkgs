name: Update Registry

on:
  schedule:
    - cron: "0 0 * * *" # every day at 00:00 UTC
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-registry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Generate registry & bump versions
        run: bash scripts/gen-registry.sh --check-updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update registry [skip ci]"
          branch: update-registry
          delete-branch: true
          title: "chore: update registry"
          body: "Automated registry update."
          base: main
          labels: auto-merge

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number != ''
        run: |
          gh pr merge --squash --auto "${{ steps.create-pr.outputs.pull-request-number }}"
          echo "Auto-merge enabled on PR #${{ steps.create-pr.outputs.pull-request-number }}. GitHub will merge it once all checks pass."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
