name: Update Registry

on:
  push:
    branches: [main]
    paths:
      - "flakes/**"
      - "scripts/gen-registry.py"
      - "scripts/eval-meta.nix"
  workflow_dispatch: {}  # allow manual runs

permissions:
  contents: write

jobs:
  update-registry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install Python dependencies
        run: nix-shell -p python3Packages.pyyaml --run "true"

      - name: Generate registry
        run: |
          nix-shell -p python3Packages.pyyaml --run \
            "python scripts/gen-registry.py"

      - name: Commit updated registry
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update registry [skip ci]"
          file_pattern: "registry.json registry.yaml"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
