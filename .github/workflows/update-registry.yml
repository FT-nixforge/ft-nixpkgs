name: Update Registry

on:
  push:
    branches: [main]
    paths:
      - "flakes/**"
      - "scripts/gen-registry.sh"
      - "scripts/eval-meta.nix"
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-registry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Create update branch
        run: git checkout -b update-registry

      - name: Generate registry
        run: bash scripts/gen-registry.sh

      - name: Commit updated registry
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update registry [skip ci]"
          branch: update-registry
          title: "chore: update registry"
          body: "Automated registry update."
          delete-branch: true
          add-paths: |
            registry.json
            registry.yaml

      - name: Create pull request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update registry [skip ci]"
          title: "chore: update registry"
          body: "Automated registry update."
          base: main
          head: update-registry
          delete-branch: true
