name: Update Registry

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-registry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Generate registry & bump versions
        run: bash scripts/gen-registry.sh --check-updates

      - name: Generate app token
        id: token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.FT_NIXFORGE_APP_ID }}
          private-key: ${{ secrets.FT_NIXFORGE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.token.outputs.token }}
          commit-message: "chore: update registry [skip ci]"
          branch: update-registry
          delete-branch: true
          title: "chore: update registry"
          body: "Automated registry update."
          base: main

      - name: Auto-merge pull request
        if: steps.create-pr.outputs.pull-request-number != ''
        run: |
          gh pr merge --squash --admin --delete-branch "${{ steps.create-pr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
