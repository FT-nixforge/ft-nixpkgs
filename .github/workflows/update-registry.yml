name: Update Registry

on:
  push:
    branches: [main]
    paths:
      - "flakes/**"
      - "scripts/gen-registry.sh"
      - "scripts/eval-meta.nix"
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-registry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure git credentials
        run: |
          git config --global url."https://github-actions[bot]:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Generate registry
        run: bash scripts/gen-registry.sh

      - name: Create pull request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update registry [skip ci]"
          branch: update-registry
          delete-branch: true
          title: "chore: update registry"
          body: "Automated registry update."
          base: main
