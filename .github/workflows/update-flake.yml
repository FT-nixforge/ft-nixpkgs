name: Update Flake

on:
  schedule:
    - cron: "0 0 * * *" # every day at 00:00 UTC
  workflow_dispatch: {}
  workflow_call: {} # allow other workflows to trigger this

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-flake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Remove GitHub auth headers
        run: |
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://api.github.com/.extraheader || true
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --local --unset-all http.https://api.github.com/.extraheader || true

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/nix
          key: ${{ runner.os }}-nix-${{ hashFiles('flake.lock') }}
          restore-keys: |
            ${{ runner.os }}-nix-

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update flake inputs
        run: nix flake update

      - name: Check flake still evaluates
        run: nix flake check --show-trace

      - name: Verify lib and modules still export correctly
        run: |
          nix eval .#lib --apply builtins.attrNames
          nix eval .#nixosModules.default --apply 'x: "ok"' || true
          nix eval .#homeModules.default --apply 'x: "ok"' || true

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update-flake-lock
          commit-message: "flake: update flake.lock"
          title: "Update flake.lock"
          body: |
            Automated daily `flake.lock` update.

            Flake check passed — lib, nixosModules, and homeModules all evaluate correctly.
          labels: |
            dependencies
            automated
            auto-merge
          delete-branch: true

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number != ''
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"
          echo "Enabling auto-merge for PR #$PR_NUMBER..."
          gh pr merge --squash --auto --delete-branch "$PR_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for checks to pass
        if: steps.create-pr.outputs.pull-request-number != ''
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"
          echo "Waiting for checks on PR #$PR_NUMBER..."

          # Poll until PR is merged or timeout (15 minutes)
          for i in {1..90}; do
            sleep 10

            state=$(gh pr view "$PR_NUMBER" --json state --jq '.state')
            if [ "$state" = "MERGED" ]; then
              echo "PR was merged successfully."
              exit 0
            fi

            if [ "$state" = "CLOSED" ]; then
              echo "PR was closed without merging."
              exit 1
            fi

            echo "PR state: $state (attempt $i/90)"
          done

          echo "Timeout waiting for merge. PR may still be open."
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
